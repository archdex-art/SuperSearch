<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self'; connect-src 'self' ipc: http://ipc.localhost https://fonts.googleapis.com https://fonts.gstatic.com">
  <title>SuperSearch</title>

  <!-- Design System -->
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/animations.css">
</head>
<body>

  <main class="app-layout" role="application" aria-label="SuperSearch Command Palette">

    <div class="main-column">
      <!-- Search Pill -->
      <div class="search-pill" role="search">
        <svg class="search-pill__icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="8.5" cy="8.5" r="5.5"/>
          <line x1="13" y1="13" x2="18" y2="18"/>
        </svg>
        <input
          id="search-input"
          class="search-pill__input"
          type="text"
          placeholder="Super Search"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
          aria-label="Search"
        >
        <span id="mode-badge" class="search-pill__badge" aria-hidden="true">⌥ Space</span>
      </div>

      <!-- Results Palette -->
      <div class="palette-container" id="palette-container" style="display: none;">
        <!-- Telemetry Strip -->
        <div class="telemetry-strip" role="status" aria-label="Kernel Telemetry">
      <div class="telemetry-item">
        <span class="telemetry-item__dot telemetry-item__dot--green" aria-hidden="true"></span>
        <span class="telemetry-item__label">Scheduler</span>
        <span class="telemetry-item__value" id="telemetry-scheduler">0 ticks</span>
      </div>
      <div class="telemetry-item">
        <span class="telemetry-item__dot telemetry-item__dot--blue" aria-hidden="true"></span>
        <span class="telemetry-item__label">Capabilities</span>
        <span class="telemetry-item__value" id="telemetry-capabilities">0 active</span>
      </div>
      <div class="telemetry-item">
        <span class="telemetry-item__dot telemetry-item__dot--violet" aria-hidden="true"></span>
        <span class="telemetry-item__label">Uptime</span>
        <span class="telemetry-item__value" id="telemetry-uptime">0s</span>
      </div>
      <div class="telemetry-item">
        <span class="telemetry-item__dot telemetry-item__dot--cyan" aria-hidden="true"></span>
        <span class="telemetry-item__label">Boot</span>
        <span class="telemetry-item__value" id="telemetry-boot">—</span>
      </div>
      <div class="status-indicator">
        <span class="status-indicator__dot" aria-hidden="true"></span>
        <span class="status-indicator__label" id="status-label">Kernel Active</span>
      </div>
    </div>

    <!-- Content Area (Results + Preview) -->
    <div id="content-area" class="content-area">
      <!-- Results Panel -->
      <div id="results-panel" class="results-panel" role="listbox" aria-label="Search Results">
        <!-- Rendered by app.js -->
      </div>

      <!-- Preview Panel -->
      <div id="preview-panel" class="preview-panel" aria-label="Result Preview">
        <!-- Rendered by preview.js -->
      </div>
    </div>

    <!-- Agent Panel (shown during agent interactions) -->
    <div id="agent-panel" class="agent-panel" aria-label="Agent Console">
      <!-- Rendered by agent.js -->
    </div>

    <!-- Composer Toolbar (Raycast/AI-composer style action row) -->
    <div class="composer-toolbar" role="toolbar" aria-label="Actions">
      <button class="ctool-btn" id="attach-btn" type="button" title="Attach a file" aria-label="Attach a file">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21.44 11.05l-9.19 9.19a5 5 0 0 1-7.07-7.07l9.19-9.19a3.5 3.5 0 0 1 4.95 4.95l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
        </svg>
      </button>
      <button class="ctool-pill" id="deepsearch-btn" type="button">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="8.5" cy="8.5" r="5.5"/><line x1="13" y1="13" x2="18" y2="18"/>
        </svg>
        <span>Deep search</span>
      </button>
      <button class="ctool-pill" id="websearch-btn" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/>
        </svg>
        <span>Search</span>
      </button>

      <span class="ctool-spacer"></span>

      <button class="ctool-btn" id="voice-btn" type="button" title="Voice" aria-label="Voice">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true">
          <path d="M5 11v2M9 7v10M13 4v16M17 8v8M21 11v2"/>
        </svg>
      </button>
      <button class="ctool-btn ctool-btn--submit" id="submit-btn" type="button" title="Run (↵)" aria-label="Run">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 19V5M5 12l7-7 7 7"/>
        </svg>
      </button>
    </div>

    <!-- Keyboard Shortcut Bar -->
    <nav class="shortcut-bar" aria-label="Keyboard Shortcuts">
      <div class="shortcut">
        <span class="shortcut__key">↑↓</span>
        <span class="shortcut__label">Navigate</span>
      </div>
      <div class="shortcut">
        <span class="shortcut__key">↵</span>
        <span class="shortcut__label">Execute</span>
      </div>
      <div class="shortcut">
        <span class="shortcut__key">⌘↵</span>
        <span class="shortcut__label">Reveal</span>
      </div>
      <div class="shortcut">
        <span class="shortcut__key">Tab</span>
        <span class="shortcut__label">Preview</span>
      </div>
      <div class="shortcut">
        <span class="shortcut__key">Esc</span>
        <span class="shortcut__label">Close</span>
      </div>
    </nav>
    </div> <!-- End palette-container -->
    </div> <!-- End main-column -->

    <div class="side-column">
      <div class="floating-actions">
        <button id="settings-btn" class="floating-btn" type="button" title="Settings" aria-label="Settings">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </button>
        <button id="extensions-btn" class="floating-btn" type="button" title="Manage Extensions" aria-label="Manage Extensions">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 11v-2a2 2 0 0 0-2-2h-2V5a2 2 0 1 0-4 0v2H9a2 2 0 0 0-2 2v2H5a2 2 0 1 0 0 4h2v2a2 2 0 0 0 2 2h2v2a2 2 0 1 0 4 0v-2h2a2 2 0 0 0 2-2v-2h2a2 2 0 1 0 0-4h-2z"></path></svg>
        </button>
      </div>
    </div>


    <!-- Extension Manager (overlay) -->
    <div id="extensions-overlay" class="ext-overlay" hidden>
      <div class="ext-panel" role="dialog" aria-modal="true" aria-label="Extension Manager">
        <header class="ext-panel__header">
          <h2 class="ext-panel__title">Extensions</h2>
          <div class="ext-panel__actions">
            <button id="ext-install-btn" class="ext-btn ext-btn--primary" type="button">Install…</button>
            <button id="ext-close-btn" class="ext-btn ext-btn--icon" type="button" aria-label="Close">✕</button>
          </div>
        </header>
        <div id="ext-list" class="ext-list" role="list">
          <!-- Rendered by extensions.js -->
        </div>
      </div>

      <!-- Permission consent modal -->
      <div id="ext-consent" class="ext-consent" hidden>
        <div class="ext-consent__box" role="dialog" aria-modal="true" aria-label="Permission Consent">
          <h3 id="ext-consent-title" class="ext-consent__title"></h3>
          <p class="ext-consent__sub">This extension is requesting:</p>
          <ul id="ext-consent-perms" class="ext-consent__perms"></ul>
          <div class="ext-consent__actions">
            <button id="ext-consent-cancel" class="ext-btn" type="button">Cancel</button>
            <button id="ext-consent-confirm" class="ext-btn ext-btn--primary" type="button">Allow &amp; Enable</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Settings (overlay) -->
    <div id="settings-overlay" class="ext-overlay" hidden>
      <div class="ext-panel ext-panel--narrow" role="dialog" aria-modal="true" aria-label="Settings">
        <header class="ext-panel__header">
          <h2 class="ext-panel__title">Settings</h2>
          <button id="settings-close-btn" class="ext-btn ext-btn--icon" type="button" aria-label="Close">✕</button>
        </header>
        <div class="settings-body">
          <label class="settings-row">
            <span class="settings-row__label">Global hotkey</span>
            <input id="settings-hotkey" class="settings-input" type="text"
                   placeholder="Alt+Space" spellcheck="false" autocomplete="off">
          </label>
          <p class="settings-hint">Tauri accelerator syntax, e.g. <code>Alt+Space</code>, <code>CommandOrControl+Space</code>.</p>

          <label class="settings-row settings-row--inline">
            <span class="settings-row__label">Hide when it loses focus</span>
            <span class="ext-toggle">
              <input id="settings-blur" type="checkbox" class="ext-toggle__input">
              <span class="ext-toggle__track"><span class="ext-toggle__thumb"></span></span>
            </span>
          </label>

          <label class="settings-row settings-row--inline">
            <span class="settings-row__label">Theme</span>
            <select id="settings-theme" class="settings-input settings-input--select">
              <option value="dark">Dark</option>
              <option value="light">Light</option>
            </select>
          </label>
        </div>
        <footer class="settings-footer">
          <span id="settings-status" class="settings-status"></span>
          <button id="settings-save-btn" class="ext-btn ext-btn--primary" type="button">Save</button>
        </footer>
      </div>
    </div>

  </main>

  <!-- App Controller (ES Module) -->
  <script type="module" src="scripts/app.js"></script>

</body>
</html>
