name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ── Front-end — TypeScript typecheck + Vite build ──────────────────────────
  # The Rust jobs build `cargo` (not the bundled front-end), so this is the only
  # gate that catches React/TS type errors and build regressions.
  frontend:
    name: Front-end typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: react-command-palette/package-lock.json

      - name: Install dependencies
        run: npm --prefix react-command-palette ci

      - name: Typecheck + build (tsc --noEmit && vite build)
        run: npm --prefix react-command-palette run build

  # ── macOS — full Tauri build + tests ───────────────────────────────────────
  build-macos:
    name: Build & test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2

      - name: Format check (advisory)
        run: cargo fmt --all --check
        continue-on-error: true

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace --verbose

      - name: Test
        run: cargo test --workspace --verbose

  # ── Linux — full Tauri build + tests ───────────────────────────────────────
  build-linux:
    name: Build & test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2

      # Tauri v2 system dependencies on Ubuntu.
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Node (for frontend build)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: react-command-palette/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix react-command-palette ci

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace --verbose

      - name: Test
        run: cargo test --workspace --verbose

  # ── Windows — full Tauri build + tests ─────────────────────────────────────
  build-windows:
    name: Build & test (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2

      - name: Install Node (for frontend build)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: react-command-palette/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix react-command-palette ci

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace --verbose

      - name: Test
        run: cargo test --workspace --verbose
