name: Release

# Push a version tag (e.g. `git tag v0.2.0 && git push --tags`) to build
# native installers for macOS, Linux, and Windows, then publish a draft
# GitHub Release.  Code-signing secrets are optional — missing ones simply
# skip signing/notarization while the build still succeeds.
on:
  push:
    tags: ["v*"]

jobs:
  release:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── macOS universal (Intel + Apple Silicon) ──────────────────────
          - platform: macos-latest
            args: --target universal-apple-darwin
            bundles: app,dmg
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin

          # ── Linux x86-64 — .deb (Debian/Ubuntu) ─────────────────────────
          - platform: ubuntu-22.04
            args: ""
            bundles: deb
            rust_targets: ""

          # ── Windows x86-64 — NSIS .exe installer + .msi ─────────────────
          - platform: windows-latest
            args: ""
            bundles: nsis,msi
            rust_targets: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2

      # ── Linux: Tauri system dependencies ────────────────────────────────
      - name: Install Tauri system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: react-command-palette/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix react-command-palette ci

      - name: Build, sign & publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # ── macOS: Apple Developer ID code signing ────────────────────
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # ── macOS: Notarization ───────────────────────────────────────
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # ── Windows: code signing (optional) ─────────────────────────
          # Set WINDOWS_CERTIFICATE + WINDOWS_CERTIFICATE_PASSWORD to enable.
          # ── Updater artifact signing ──────────────────────────────────
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "SuperSearch ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          # Limit bundles per-OS via `--bundles` so Linux doesn't attempt `rpm`
          # (no rpmbuild on the runner) that `targets: "all"` would otherwise pull.
          args: ${{ matrix.args }} --bundles ${{ matrix.bundles }}
