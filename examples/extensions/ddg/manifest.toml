id = "ddg"
name = "DuckDuckGo Search"
version = "1.0.0"
author = "SuperSearch"
description = "Open a DuckDuckGo web search for your query"
kind = "script"
entrypoint = "run.sh"
keywords = ["ddg", "search", "web"]

